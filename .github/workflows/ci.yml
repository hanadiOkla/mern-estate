name: MERN Estate CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. مهمة فحص وتأكيد بناء الـ Backend
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './package-lock.json' # تم التعديل للمسار الرئيسي الصحيح

      - name: Install Backend Dependencies
        run: |
          cd api
          npm ci

  # 2. مهمة فحص وتأكيد بناء الـ Frontend (client)
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: Build Frontend Application
        run: |
          cd client
          CI=false npm run build